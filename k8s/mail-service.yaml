apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailservice
  template:
    metadata:
      labels:
        app: mailservice
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka..."
              until nc -z kafka 9092; do
                echo "Kafka not ready yet..."
                sleep 2
              done
              echo "Kafka is ready!"
      containers:
        - name: mailservice
          image: mailservice:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: "mailer-service"
            - name: SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET
              value: "earliest"
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: mailservice
spec:
  type: ClusterIP
  selector:
    app: mailservice
  ports:
    - port: 8082
      targetPort: 8082